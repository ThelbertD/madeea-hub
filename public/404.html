<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MadeEA EA Hub</title>
    <!--
      GitHub Pages SPA fallback (https://github.com/rafgraph/spa-github-pages).
      Pages serves this file for any unknown path; it re-encodes the path into a
      query string and bounces to index.html, where a small script restores it.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // keep "/madeea-hub/" prefix (project page)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
